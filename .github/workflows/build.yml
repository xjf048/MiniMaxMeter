name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show macOS / Xcode version
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build -c release

      - name: Verify .app bundle assembles
        run: |
          mkdir -p MiniMaxMeter.app/Contents/MacOS MiniMaxMeter.app/Contents/Resources
          cp .build/release/MiniMaxMeter MiniMaxMeter.app/Contents/MacOS/MiniMaxMeter
          chmod +x MiniMaxMeter.app/Contents/MacOS/MiniMaxMeter
          test -x MiniMaxMeter.app/Contents/MacOS/MiniMaxMeter && echo "✅ Executable OK"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiniMaxMeter-${{ github.sha }}
          path: MiniMaxMeter.app
          if-no-files-found: error
